<!doctype html>
<html lang="pt-br" class="transition-colors duration-500">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login e Registro</title>
  </head>

  <body class="min-h-screen flex items-center justify-center 
  bg-gradient-to-br 
  from-indigo-200 via-purple-200 to-gray-200
  dark:from-indigo-900 dark:via-purple-900 dark:to-gray-900
  overflow-hidden relative transition-colors duration-500">

    <!-- Botão Dark Mode -->
    <button 
      id="theme-toggle"
      class="absolute top-5 right-5 
      bg-gray-200 dark:bg-gray-700 
      text-black dark:text-white
      px-3 py-1 rounded-lg transition">
      🌙
    </button>

    <!-- Fundo animado -->
    <div class="absolute inset-0 -z-10">
      <div class="absolute w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
      <div class="absolute w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
      <div class="absolute w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Card -->
    <div class="bg-white/70 dark:bg-white/10 
      backdrop-blur-lg p-8 rounded-2xl shadow-2xl 
      w-96 text-gray-900 dark:text-white 
      border border-gray-200 dark:border-white/10
      transition">

      <h2 id="form-title" class="text-2xl font-bold text-center mb-6">
        Login
      </h2>

      <form id="auth-form" class="space-y-4">
        <div id="username-field" class="hidden">
          <input type="text" placeholder="Usuário"
            class="w-full px-4 py-2 rounded-lg 
            bg-white dark:bg-white/20
            border border-gray-300 dark:border-white/20
            placeholder-gray-500 dark:placeholder-gray-300
            focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
        </div>

        <div>
          <input 
            id="email"
            type="email" 
            placeholder="E-mail"
            class="w-full px-4 py-2 rounded-lg 
            bg-white dark:bg-white/20
            border border-gray-300 dark:border-white/20
            placeholder-gray-500 dark:placeholder-gray-300
            focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
        </div>

        <div>
          <input 
            id="password"
            type="password" 
            placeholder="Senha"
            class="w-full px-4 py-2 rounded-lg 
            bg-white dark:bg-white/20
            border border-gray-300 dark:border-white/20
            placeholder-gray-500 dark:placeholder-gray-300
            focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
        </div>

      <!-- Mensagem de erro -->
      <div id="error-message"
        class="hidden text-red-400 text-sm bg-red-500/10 border border-red-500/30 p-2 rounded-lg">
      </div>

        <div id="success-message"
          class="hidden text-green-600 dark:text-green-400 text-sm 
          bg-green-500/10 border border-green-500/30 p-2 rounded-lg">
        </div>

        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 
          dark:bg-indigo-500 dark:hover:bg-indigo-600
          text-white transition duration-300 py-2 rounded-lg font-semibold">
          Entrar
        </button>

      </form>

      <p class="text-center mt-4 text-sm">
        <span id="toggle-text">Não tem conta?</span>
        <button id="toggle-btn"
          class="text-indigo-600 dark:text-indigo-400 hover:underline ml-1">
          Registrar-se
        </button>
      </p>

    </div>

    <script type="module" src="/src/main.js"></script>

  </body>
</html>
